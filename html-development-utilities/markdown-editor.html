<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Editor & Previewer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f5f5f7; color: #333; }
        
        /* Header & Toolbar */
        header { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; color: #222; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn { background: #0071e3; color: white; padding: 6px 12px; border-radius: 4px; border: none; font-size: 0.9rem; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #0077ed; }
        #file-input { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        /* Main Workspace split screen */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .pane { width: 50%; display: flex; flex-direction: column; background: #fff; }
        .left-pane { border-right: 1px solid #ddd; }
        
        /* Pane Titles / Tabs */
        .pane-header { background: #fafafa; border-bottom: 1px solid #ddd; padding: 8px 15px; display: flex; gap: 10px; align-items: center; min-height: 45px; }
        .pane-title { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
        
        /* Tab Controls */
        .tabs { display: flex; gap: 5px; }
        .tab-btn { background: none; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; color: #666; }
        .tab-btn.active { background: #e8e8ed; color: #000; font-weight: 600; }

        /* Content Areas */
        .content-area { flex: 1; padding: 20px; overflow-y: auto; font-size: 1rem; line-height: 1.6; }
        textarea { width: 100%; height: 100%; border: none; resize: none; outline: none; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 0.95rem; line-height: 1.5; color: #2c3e50; }
        
        /* Views */
        .view-panel { display: none; height: 100%; }
        .view-panel.active { display: block; }
        
        /* Raw Code View Formatting */
        #view-html pre { background: #2d3748; padding: 15px; border-radius: 6px; overflow-x: auto; }
        #html-output { font-family: monospace; color: #f7fafc; white-space: pre-wrap; font-size: 0.9rem; }

        /* Basic Markdown Preview Styling */
        .preview-body h1, .preview-body h2, .preview-body h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; color: #111; }
        .preview-body h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .preview-body p { margin-bottom: 1rem; }
        .preview-body :not(pre) > code { background: rgba(27,31,35,0.08); padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 85%; color: #d63384; }
        .preview-body ul, .preview-body ol { padding-left: 2rem; margin-bottom: 1rem; }
        .preview-body pre { margin-bottom: 1rem; border-radius: 6px; }
    </style>
</head>
<body>

    <header>
        <h1>Markdown Editor</h1>
        <div class="file-input-wrapper">
            <button class="btn">📂 Load .md File</button>
            <input type="file" id="file-input" accept=".md,.txt">
        </div>
    </header>

    <div class="workspace">
        <div class="pane left-pane">
            <div class="pane-header">
                <span class="pane-title">Markdown Input</span>
            </div>
            <div class="content-area">
                <textarea id="markdown-editor" placeholder="Type some Markdown here..."></textarea>
            </div>
        </div>

        <div class="pane right-pane">
            <div class="pane-header">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('preview')">Live Preview</button>
                    <button class="tab-btn" onclick="switchTab('html')">Raw HTML</button>
                </div>
            </div>
            <div class="content-area">
                <div id="view-preview" class="view-panel preview-body"></div>
                
                <div id="view-html" class="view-panel">
                    <pre><code id="html-output" class="language-html"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('markdown-editor');
        const fileInput = document.getElementById('file-input');
        
        const viewPreview = document.getElementById('view-preview');
        const htmlOutput = document.getElementById('html-output');

        // Sample Markdown to showcase syntax highlighting out-of-the-box
        const defaultText = `# Live Markdown Preview with Syntax Highlighting\n\nTry writing some code blocks down below:\n\n### JavaScript Example\n\`\`\`javascript\nconst greet = (name) => {\n    console.log(\`Hello, \${name}!\`);\n};\n\ngreet("Developer");\n\`\`\`\n\n### Python Example\n\`\`\`python\ndef find_sum(a, b):\n    return a + b\n\nprint(find_sum(5, 10))\n\`\`\`\n\n### CSS Example\n\`\`\`css\n.btn {\n    background-color: #0071e3;\n    color: #ffffff;\n    border-radius: 4px;\n}\n\`\`\``;
        editor.value = defaultText;

        // Core compilation logic
        function updateOutput() {
            const markdownText = editor.value;
            
            // 1. Render Live HTML Preview
            const cleanHtml = marked.parse(markdownText);
            viewPreview.innerHTML = cleanHtml;
            
            // 2. Render Raw HTML text string
            htmlOutput.textContent = cleanHtml;
            
            // 3. Trigger Prism to highlight code blocks on the page dynamically
            Prism.highlightAllUnder(viewPreview); // highlights the preview pane
            Prism.highlightElement(htmlOutput);   // highlights the raw HTML code tab
        }

        // Event listener for typing
        editor.addEventListener('input', updateOutput);

        // Event listener for loading local files
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                editor.value = evt.target.result;
                updateOutput();
            };
            reader.readAsText(file);
        });

        // Tab Switching Engine
        function switchTab(tabId) {
            // Update Active Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update Active Panels
            document.querySelectorAll('.view-panel').forEach(panel => panel.style.display = 'none');
            document.getElementById(`view-${tabId}`).style.display = 'block';
        }

        // Initialize display on startup
        updateOutput();
        switchTab('preview');
    </script>
</body>
</html>
